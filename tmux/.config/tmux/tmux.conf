# --- Configuración General ---

# Cambiar el prefijo de Ctrl-b a Ctrl-a (más cómodo, como el viejo Screen)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mejorar el tiempo de respuesta (evita retrasos al usar Esc en Neovim)
set -s escape-time 0

# Habilitar el mouse (por si quieres redimensionar paneles rápidamente)
set -g mouse on

# --- Atajos Estilo Vim ---

# Moverse entre paneles con h, j, k, l
# --- MOVIMIENTO DE PANELES (Repetible como las flechas) ---
# Esto permite que: C-a, j, j, j  salte 3 paneles hacia abajo.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# --- REDIMENSIÓN DE PANELES (Manteniendo C-a presionado) ---
# Esto es un truco: al usar Control + la letra, emulamos el comportamiento
# de mantener presionado el prefijo (C-a) mientras tocas la tecla.
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Splits con teclas más intuitivas (y que mantienen la ruta actual)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Estética y Terminal ---

# Asegurar que los colores se vean bien (importante para tu Neovim)
# set -g default-terminal "foot"
# set -ag terminal-overrides ",foot:Tc"

# # Barra de estado simple (estilo minimalista)
# set -g status-style bg=default,fg=white
# set -g status-left " "
# set -g status-right "#[fg=green]#S #[fg=yellow]%H:%M "

# 1. Terminal por defecto dentro de tmux
set -g default-terminal "tmux-256color"

# 2. Soporte de Color Real (True Color) para foot
# Usamos RGB para que Neovim detecte correctamente las capacidades
set -asga terminal-overrides ",foot:RGB"

# 3. Eventos de foco para Neovim
set -g focus-events on

# 4. Escape time (vital para Vim/NVim)
set -sg escape-time 0
